<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕽𝖊𝖒𝖎𝖝𝖎𝖔 | Profile</title>
  <link rel="stylesheet" href="./Profile.css" />

  <link rel="shortcut icon" href="./ChatGPT Image Jun 13, 2026, 11_31_10 PM.png" type="image/x-icon">
</head>
<body>
  <div class="nav-main">
    <div class="background1"></div>
    <div class="nav-bar">
      <div class="buttons1">
        <a href="./Search.html" class="href">
          <button class="button1"><u class="text1">🔎</u></button>
        </a>

        <a href="./MusicHome.html" class="href">
          <button class="button3"><u class="text3">🏚</u></button>
        </a>
        <a href="./Profile.html" class="href">
          <button class="button4 active"><u class="text4">🙍🏻‍♂️</u></button>
        </a>
      </div>
    </div>
    <div class="background2"></div>


    <div class="main-bar">
      <div class="profile-hero">
        <div>
          <h1 class="page-title">♨R∑MIXI☯</h1>
          <p class="sub-title">Your Profile</p>
        </div>
      </div>

      <div class="profile-card">
        <div class="profile-top">
          <div class="profile-picture-wrap">
            <img id="profilePicture" class="profile-picture" src="./../file_0000000056c471f4814bd54fa3232bc4.png" alt="Profile picture" />
          </div>

          <div class="profile-picture-actions">
            <input id="profilePictureInput" class="profile-picture-input" type="file" accept="image/*" />
            <button class="profile-save" id="profileSaveBtn" type="button">Save</button>
          </div>
        </div>

        <div class="profile-info-grid">
          <div class="info-pill"><p class="subtitle" id="welcomeText"></p></div>
          <div class="info-pill"><p class="subtitle" id="UserName"></p></div>
          <div class="info-pill"><p class="subtitle" id="UserPassword"></p></div>
        </div>

        <div class="logout-wrap">
          <a href="./index.html"><button class="logout" id="logoutBtn" type="button">Logout</button></a>
        </div>
      </div>
    </div>

  </div>

  <script src="./Profile.js"></script>
</body>
</html>
