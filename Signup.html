<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕽𝖊𝖒𝖎𝖝𝖎𝖔 | Sign Up</title>
  <link rel="stylesheet" href="./Signup.css" />
  <link rel="shortcut icon" href="./ChatGPT Image Jun 13, 2026, 11_31_10 PM.png" type="image/x-icon">
</head>
<body>
  <div class="nav-main">

    <div class="background2"></div>

    <div class="main-bar">
      <div class="header">
        <h1 class="page-title">♨R∑MIXI☯</h1>
        <p class="sub">Create your account</p>
      </div>

      <div class="auth-card" role="region" aria-label="Sign up">
        <form id="signup-form" class="auth-form" autocomplete="off">
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="you@example.com" />
          </div>

          <div class="field">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" required minlength="2" maxlength="30" placeholder="Your name" />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required minlength="6" placeholder="At least 6 characters" />
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6" placeholder="Re-enter password" />
          </div>

          <div id="signup-message" class="message" aria-live="polite"></div>

          <div class="actions">
            <button class="primary" type="submit">Create account</button>
            <a class="secondary-link" href="./index.html">Already have an account? Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./Signup.js"></script>
</body>
</html>
