<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>𝕽𝖊𝖒𝖎𝖝𝖎𝖔 | Login</title>
  <link rel="stylesheet" href="./index.css" />
  <link rel="shortcut icon" href="./ChatGPT Image Jun 13, 2026, 11_31_10 PM.png" type="image/x-icon">
</head>
<body>
  <div class="nav-main">

    <div class="background2"></div>

    <div class="main-bar">
      <div class="header">
        <h1 class="page-title">♨R∑MIXI☯</h1>
        <p class="sub">Login to your account</p>
      </div>

      <div class="auth-card" role="region" aria-label="Login">
        <form id="login-form" class="auth-form" autocomplete="off">
          <div class="field">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" name="loginEmail" type="email" required placeholder="you@example.com" />
          </div>

          <div class="field">
            <label for="loginPassword">Password</label>
            <input id="loginPassword" name="loginPassword" type="password" required minlength="6" placeholder="Your password" />
          </div>

          <div id="login-message" class="message" aria-live="polite"></div>

          <div class="actions">
            <button class="primary" type="submit">Log in</button>
            <a class="secondary-link" href="./Signup.html">Create an account</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="./index.js"></script>
</body>
</html>
